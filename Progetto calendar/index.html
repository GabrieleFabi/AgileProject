<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calendario Docenti — Giacomazzi Enrico (Upload locale)</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="title">
          <div class="logo" id="courseLogo" aria-hidden="true">DOCENTE</div>
          <div>
            <h1>Calendario Docenti</h1>
            <div class="sub">
              <span id="subLabel">Lezioni di <strong>Giacomazzi Enrico</strong></span>
            </div>
          </div>
        </div>

        <div class="badge" id="statusBadge">Carica un file Excel (.xlsx)…</div>
      </header>

      <!-- Upload + Calendario -->
      <section id="appSection" class="uibox">
        <!-- Controlli di upload -->
        <div class="card">
          <div class="inner controls">
            <div id="dropZone" class="dropzone" tabindex="0" role="button" aria-label="Trascina qui il file Excel o clicca per selezionarlo">
              <div>
                <strong>Trascina qui</strong> il file <code>.xlsx</code><br />
                <span class="muted">Oppure</span>
                <button id="pickBtn" type="button" class="btn">Scegli dal computer</button>
              </div>
              <input id="fileInput" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden />
            </div>
            <div class="note">
              Il file deve essere lo stesso usato per gli studenti. Verranno mostrate solo le lezioni del docente selezionato.
            </div>
          </div>
        </div>

        <!-- UI nascoste richieste da app.js (solo per funzioni di formattazione) -->
        <div class="hidden-ui">
          <select id="dateColumnSelect"></select>
          <select id="timeColumnSelect"></select>
        </div>

        <!-- Calendario -->
        <div class="card">
          <div class="inner controls-split">
            <div class="controls-inline centered">
              <input id="searchInput" type="search" class="input" placeholder="Cerca..." aria-label="Cerca lezioni" />
              <button id="showAllBtn" class="btn" type="button">Mostra tutto</button>
            </div>
          </div>
          <div class="table-wrap">
            <table id="dataTable" aria-live="polite">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
          <div class="footer">
            <div id="rowsCount">—</div>
            <div id="paginationControls" class="pager">
              <button id="prevPage" class="btn" type="button" aria-label="Pagina precedente">←</button>
              <span id="pageInfo" class="muted" style="min-width:110px; text-align:center;">—</span>
              <button id="nextPage" class="btn" type="button" aria-label="Pagina successiva">→</button>
              <span class="muted" style="margin-left:8px;">/ per pagina</span>
              <select id="pageSize" class="sel">
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      // Nome esatto del docente da filtrare
      window.TEACHER_NAME = "GIACOMAZZI ENRICO";
    </script>
    <script src="app.js" defer></script>
  </body>
</html>
