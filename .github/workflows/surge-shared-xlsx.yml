name: Deploy Docenti & Studenti (shared XLSX)

on:
  schedule:
    - cron: '0 */4 * * *'   # ogni 4 ore
  push:
    paths:
      - 'Progetto Calendar/Docenti/**'
      - 'Progetto Calendar/Studenti/**'
      - '.github/workflows/surge-shared-xlsx.yml'
  workflow_dispatch:

# Evita run sovrapposte se il cron/push si accavallano
concurrency:
  group: surge-shared-xlsx
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      SURGE_TOKEN:            ${{ secrets.SURGE_TOKEN }}
      SURGE_DOMAIN_DOC:       ${{ secrets.SURGE_DOMAIN_DOC }}
      SURGE_DOMAIN_STUD:      ${{ secrets.SURGE_DOMAIN_STUD }}
      APPS_SCRIPT_URL_SHARED: ${{ secrets.APPS_SCRIPT_URL_SHARED }}
      BASE_DIR: "Progetto Calendar"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate secrets and web app URL
        run: |
          fail=0
          for var in SURGE_TOKEN SURGE_DOMAIN_DOC SURGE_DOMAIN_STUD APPS_SCRIPT_URL_SHARED; do
            if [ -z "${!var}" ]; then
              echo "::error title=Missing secret::${var} is EMPTY"
              fail=1
            fi
          done
          if [ $fail -ne 0 ]; then exit 1; fi

          case "$APPS_SCRIPT_URL_SHARED" in
            https://script.google.com/*/exec*) echo "Web App URL format OK";;
            *) echo "::error title=Bad URL::APPS_SCRIPT_URL_SHARED must start with https://script.google.com and end with /exec"; exit 1;;
          esac

      - name: Sanity check sorgenti
        run: |
          test -f "${BASE_DIR}/Docenti/index.html"  || (echo "Manca ${BASE_DIR}/Docenti/index.html" && exit 1)
          test -f "${BASE_DIR}/Studenti/index.html" || (echo "Manca ${BASE_DIR}/Studenti/index.html" && exit 1)

      - name: Install Surge
        run: npm i -g surge@latest

      - name: Download & decode shared calendario.xlsx (JSON base64 -> XLSX)
        run: |
          mkdir -p "${BASE_DIR}/Data"
          # Scarica JSON dalla Web App GAS
          curl --fail --show-error --location \
               "${APPS_SCRIPT_URL_SHARED}?t=${GITHUB_RUN_ID}" \
               -o /tmp/cal.json

          # Estrai il campo .b64 e decodifica in binario
          B64=$(jq -r '.b64 // empty' /tmp/cal.json)
          if [ -z "$B64" ]; then
            echo "::error title=GAS error::Risposta senza .b64"
            echo "Body ricevuto:"
            cat /tmp/cal.json
            exit 1
          fi

          echo "$B64" | base64 -d > "${BASE_DIR}/Data/calendario.xlsx" || {
            echo "::error title=Decode failed::Impossibile decodificare base64"
            exit 1
          }

          # Sanity check: dimensione minima 1KB
          if [ ! -s "${BASE_DIR}/Data/calendario.xlsx" ] || [ $(stat -c%s "${BASE_DIR}/Data/calendario.xlsx") -lt 1024 ]; then
            echo "::error title=File too small::XLSX vuoto o troppo piccolo"
            exit 1
          fi

      - name: Copy XLSX into Docenti & Studenti
        run: |
          mkdir -p "${BASE_DIR}/Docenti/data" "${BASE_DIR}/Studenti/data"
          cp "${BASE_DIR}/Data/calendario.xlsx" "${BASE_DIR}/Docenti/data/calendario.xlsx"
          cp "${BASE_DIR}/Data/calendario.xlsx" "${BASE_DIR}/Studenti/data/calendario.xlsx"

      - name: Deploy Docenti
        run: |
          surge --project "${BASE_DIR}/Docenti" \
                --domain "$SURGE_DOMAIN_DOC" \
                --token "$SURGE_TOKEN"

      - name: Deploy Studenti
        run: |
          surge --project "${BASE_DIR}/Studenti" \
                --domain "$SURGE_DOMAIN_STUD" \
                --token "$SURGE_TOKEN"
