name: Deploy Docenti & Studenti (shared XLSX)

on:
  schedule:
    - cron: '0 */4 * * *'   # ogni 4 ore
  push:
    paths:
      - 'Docenti/**'
      - 'Studenti/**'
      - '.github/workflows/surge-shared-xlsx.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate web app URL
        run: |
          URL='${{ secrets.APPS_SCRIPT_URL_SHARED }}'
          if [ -z "$URL" ]; then
            echo "APPS_SCRIPT_URL_SHARED is EMPTY"; exit 1
          fi
          echo "URL length: ${#URL}"
          case "$URL" in
            https://script.google.com/*/exec*) echo "URL format looks OK";;
            *) echo "URL must start with https://script.google.com and end with /exec"; exit 1;;
          esac

      - name: Download shared calendario.xlsx
        env:
          URL: ${{ secrets.APPS_SCRIPT_URL_SHARED }}
        run: |
          mkdir -p Data
          curl --fail --show-error --location "$URL" -o Data/calendario.xlsx
          test -s Data/calendario.xlsx || (echo "XLSX missing/empty" && exit 1)


      # 2) Copia l'xlsx nelle due app (ogni sito ha la sua root su Surge)
      - name: Copy XLSX into Docenti & Studenti
        run: |
          mkdir -p "Docenti/data" "Studenti/data"
          cp Data/calendario.xlsx "Docenti/data/calendario.xlsx"
          cp Data/calendario.xlsx "Studenti/data/calendario.xlsx"

      - name: Install Surge
        run: npm i -g surge

      # 3) Deploy Docenti (upload differenziale: cambierà solo l'xlsx)
      - name: Deploy Docenti
        run: |
          surge --project "Docenti" \
                --domain "$SURGE_DOMAIN_DOC" \
                --token "$SURGE_TOKEN"

      # 4) Deploy Studenti
      - name: Deploy Studenti
        run: |
          surge --project "Studenti" \
                --domain "$SURGE_DOMAIN_STUD" \
                --token "$SURGE_TOKEN"
        env:
          SURGE_TOKEN:            ${{ secrets.SURGE_TOKEN }}
          SURGE_DOMAIN_DOC:       ${{ secrets.SURGE_DOMAIN_DOC }}
          SURGE_DOMAIN_STUD:      ${{ secrets.SURGE_DOMAIN_STUD }}
          APPS_SCRIPT_URL_SHARED: ${{ secrets.APPS_SCRIPT_URL_SHARED }}
